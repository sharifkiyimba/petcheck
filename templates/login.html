{% extends "base.html" %}
{% block title %}Login — PetCheck{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🐾</div>
    <h1>Welcome Back</h1>
    <p class="auth-sub">Log in to your PetCheck account.</p>

    {% if error %}
    <div class="auth-error">⚠️ {{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="auth-success">✅ {{ success }}</div>
    {% endif %}

    <form method="POST" action="/login" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn-primary" style="width:100%">Log In →</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="/register">Sign up free</a></p>
  </div>
</section>
{% endblock %}
