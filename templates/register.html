{% extends "base.html" %}
{% block title %}Register — PetCheck{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🐾</div>
    <h1>Create Your Account</h1>
    <p class="auth-sub">Join PetCheck and keep your pet healthy.</p>

    {% if error %}
    <div class="auth-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/register" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="e.g. Sarah Nakato" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="At least 6 characters" required />
      </div>
      <div class="form-group">
        <label>I am a...</label>
        <div class="role-select">
          <label class="role-option">
            <input type="radio" name="role" value="pet_owner" checked />
            <span>🐶 Pet Owner</span>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="vet" />
            <span>🩺 Vet Doctor</span>
          </label>
        </div>
      </div>
      <button type="submit" class="btn-primary" style="width:100%">Create Account →</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
  </div>
</section>
{% endblock %}
